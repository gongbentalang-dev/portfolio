<!-- Lightbox -->
<div id="lightbox">
  <button id="close" type="button" aria-label="閉じる">×</button>

  <img id="lightbox-img" alt="拡大表示された画像">

  <button class="arrow left" type="button" aria-label="前の画像">‹</button>
  <button class="arrow right" type="button" aria-label="次の画像">›</button>

  <div class="photo-info">
    <p id="camera"></p>
    <p id="settings"></p>
  </div>
</div>

<!-- EXIF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
