<!-- Lightbox -->
<div id="lightbox">

  <!-- 画像だけ中央 -->
  <img id="lightbox-img" src="" alt="拡大画像">

  <!-- EXIFは別で右固定 -->
  <div class="lightbox-info">
    <p>カテゴリ: <span class="category"></span></p>
    <p>撮影日: <span class="shootingDate"></span></p>
    <p>カメラ: <span class="camera"></span></p>
    <p>レンズ: <span class="lens"></span></p>
    <p>F値: <span class="fNumber"></span></p>
    <p>SS: <span class="shutterSpeed"></span></p>
    <p>ISO: <span class="iso"></span></p>
